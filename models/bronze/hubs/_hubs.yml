version: 2

models:
  - name: hub_customer
    description: >
      Data Vault 2.0 Hub for Customers. One row per unique CUSTOMER_ID.
      Insert-only — stores the first-seen load datetime and record source.
    columns:
      - name: HK_CUSTOMER
        description: "SHA-256 hash key on CUSTOMER_ID"
        tests:
          - unique
          - not_null
      - name: CUSTOMER_ID
        description: "Natural business key"
        tests:
          - unique
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null
      - name: RECORD_SOURCE
        tests:
          - not_null

  - name: hub_order
    description: >
      Data Vault 2.0 Hub for Orders. One row per unique ORDER_ID.
    columns:
      - name: HK_ORDER
        description: "SHA-256 hash key on ORDER_ID"
        tests:
          - unique
          - not_null
      - name: ORDER_ID
        description: "Natural business key"
        tests:
          - unique
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null
      - name: RECORD_SOURCE
        tests:
          - not_null

  - name: hub_product
    description: >
      Data Vault 2.0 Hub for Products. One row per unique PRODUCT_ID.
    columns:
      - name: HK_PRODUCT
        description: "SHA-256 hash key on PRODUCT_ID"
        tests:
          - unique
          - not_null
      - name: PRODUCT_ID
        description: "Natural business key"
        tests:
          - unique
          - not_null
      - name: LOAD_DATETIME
        tests:
          - not_null
      - name: RECORD_SOURCE
        tests:
          - not_null
