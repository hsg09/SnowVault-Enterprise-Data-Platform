# =============================================================================
# dbt Profiles — Data Vault 2.0 Snowflake Data Platform
#
# Each target maps to a Snowflake deployment context.
# All credentials are injected via environment variables (see .env.example).
#
# NOTE: This file lives in the project root for CI/CD portability.
#       For local dev, either symlink to ~/.dbt/profiles.yml or use
#       dbt run --profiles-dir .
# =============================================================================

snowvault_enterprise:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"

  outputs:

    # ---- Local Development ----
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      private_key_passphrase: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE', '') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'DATA_ENGINEER') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'DEV_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'RAW_VAULT') }}"
      schema: "{{ env_var('DBT_DEV_USER', 'local') }}_dev"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      query_tag: "dbt_dev_{{ env_var('DBT_DEV_USER', 'local') }}"
      client_session_keep_alive: true
      connect_retries: 3
      connect_timeout: 30

    # ---- CI / Pull-Request Validation ----
    ci:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      private_key_passphrase: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE', '') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'DATA_ENGINEER') }}"
      warehouse: "CI_WH"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'RAW_VAULT') }}"
      schema: "ci_{{ env_var('GITHUB_RUN_ID', 'local') }}"
      threads: 8
      query_tag: "dbt_ci_pr_{{ env_var('GITHUB_RUN_ID', 'local') }}"

    # ---- Staging ----
    staging:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      private_key_passphrase: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE', '') }}"
      role: "TRANSFORMER"
      warehouse: "TRANSFORMER_WH"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'RAW_VAULT') }}"
      schema: "staging"
      threads: 8
      query_tag: "dbt_staging"
      connect_retries: 5
      connect_timeout: 60

    # ---- Production (Primary Region — AWS US East 1) ----
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      private_key_passphrase: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE', '') }}"
      role: "TRANSFORMER"
      warehouse: "TRANSFORMER_WH"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'RAW_VAULT') }}"
      schema: "production"
      threads: 16
      query_tag: "dbt_prod"
      connect_retries: 5
      connect_timeout: 120

    # ---- Production (Secondary Region — AWS EU West 1) ----
