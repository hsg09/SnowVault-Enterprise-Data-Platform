# =============================================================================
# terraform_ci_cd.yml — Terraform CI/CD Pipeline
# Data Vault 2.0 Snowflake Data Platform
#
# TRIGGERS:
#   - PR: terraform plan (preview changes)
#   - Push to main: terraform apply (deploy infrastructure)
#
# FEATURES:
#   - terraform fmt check
#   - terraform validate
#   - terraform plan with PR comment
#   - terraform apply on merge to main
#   - Multi-environment support (dev/staging/prod)
# =============================================================================

name: Terraform CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

  push:
    branches: [main]
    paths:
      - 'terraform/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev/staging/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: '1.9.0'
  TF_VAR_snowflake_account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  TF_VAR_snowflake_user: ${{ secrets.TF_SNOWFLAKE_USER }}
  TF_VAR_snowflake_private_key_path: ${{ secrets.TF_SNOWFLAKE_PRIVATE_KEY_PATH }}

# =============================================================================
# Jobs
# =============================================================================

jobs:

  # ===========================================================================
  # Job 1: Terraform Validation (PR)
  # ===========================================================================
  validate:
    name: 🔍 Terraform Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: terraform/

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}

  # ===========================================================================
  # Job 2: Terraform Plan (PR)
  # ===========================================================================
  plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -out=tfplan \
            -var-file=terraform.tfvars \
            2>&1 | tee plan_output.txt
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Comment PR with plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(
              'terraform/environments/${{ matrix.environment }}/plan_output.txt', 'utf8'
            );

            const output = `### Terraform Plan — \`${{ matrix.environment }}\`

            \`\`\`
            ${planOutput.substring(0, 65000)}
            \`\`\`

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ===========================================================================
  # Job 3: Terraform Apply (push to main)
  # ===========================================================================
  apply:
    name: 🚀 Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform apply
        run: |
          terraform apply \
            -auto-approve \
            -var-file=terraform.tfvars
        working-directory: terraform/environments/${{ matrix.environment }}
