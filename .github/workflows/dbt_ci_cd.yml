# =============================================================================
# dbt_ci_cd.yml — dbt CI/CD Pipeline
# Data Vault 2.0 Snowflake Data Platform
#
# TRIGGERS:
#   - PR: Lint + slim CI build + tests on modified models
#   - Push to main: Full production deploy with test gates
#
# FEATURES:
#   - SQLFluff linting
#   - Slim CI with state:modified (only builds changed models)
#   - Multi-layer test gates (bronze → silver → gold)
#   - dbt docs generation and artifact upload
#   - Ephemeral CI schema cleanup
# =============================================================================

name: dbt CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'analyses/**'
      - 'dbt_project.yml'
      - 'packages.yml'

  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'

  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Run full refresh (rebuild all incremental models)?'
        required: false
        default: 'false'

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PRIVATE_KEY_PATH: ${{ github.workspace }}/snowflake_key.p8
  SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
  SNOWFLAKE_ROLE: DATA_ENGINEER
  SNOWFLAKE_WAREHOUSE: CI_WH
  SNOWFLAKE_DATABASE: RAW_VAULT
  DBT_PROFILES_DIR: ${{ github.workspace }}
  PYTHON_VERSION: '3.11'

# =============================================================================
# Jobs
# =============================================================================

jobs:

  # ===========================================================================
  # Job 1: Lint
  # ===========================================================================
  lint:
    name: 🔍 SQLFluff Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Snowflake private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > ${{ github.workspace }}/snowflake_key.p8
        shell: bash

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install sqlfluff sqlfluff-templater-dbt dbt-snowflake

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: SQLFluff lint
        run: |
          sqlfluff lint models/ \
            --dialect snowflake \
            --config pyproject.toml \
            --format github-annotation

  # ===========================================================================
  # Job 2: CI Build (PR validation)
  # ===========================================================================
  ci_build:
    name: 🏗️ CI Build & Test
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    env:
      DBT_TARGET: ci
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Write Snowflake private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > ${{ github.workspace }}/snowflake_key.p8
        shell: bash

      - name: Checkout main (for state comparison)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install dbt-snowflake

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: Debug connection
        run: dbt debug --profiles-dir . --target ci

      # Generate manifest from main branch for slim CI
      - name: Generate main branch manifest
        run: |
          cd main-branch
          pip install dbt-snowflake
          dbt deps --profiles-dir .
          dbt compile --profiles-dir . --target ci
          cp target/manifest.json ../manifest_main.json

      # Slim CI: only build modified models
      - name: dbt build (modified only)
        run: |
          dbt build \
            --select state:modified+ \
            --defer --state . \
            --profiles-dir . \
            --target ci \
            ${{ github.event.inputs.full_refresh == 'true' && '--full-refresh' || '' }}
        env:
          DBT_STATE: ${{ github.workspace }}

      # Run tests on modified models
      - name: dbt test (modified)
        run: |
          dbt test \
            --select state:modified+ \
            --defer --state . \
            --profiles-dir . \
            --target ci

      # Generate docs for PR review
      - name: Generate docs
        run: dbt docs generate --profiles-dir . --target ci

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-ci-artifacts-${{ github.run_id }}
          path: |
            target/manifest.json
            target/run_results.json
            target/catalog.json
          retention-days: 7

      # Cleanup ephemeral CI schema
      - name: Cleanup CI schema
        if: always()
        run: |
          dbt run-operation drop_schema \
            --args "{'schema_name': 'ci_${{ github.run_id }}'}" \
            --profiles-dir . \
            --target ci || true

  # ===========================================================================
  # Job 3: Production Deploy (push to main)
  # ===========================================================================
  deploy:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      DBT_TARGET: prod
      SNOWFLAKE_WAREHOUSE: TRANSFORMER_WH
      SNOWFLAKE_ROLE: TRANSFORMER
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Snowflake private key
        run: echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > ${{ github.workspace }}/snowflake_key.p8
        shell: bash

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install dbt-snowflake

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: Debug connection
        run: dbt debug --profiles-dir . --target prod

      # Load reference data
      - name: dbt seed
        run: dbt seed --profiles-dir . --target prod

      # Deploy: Bronze layer
      - name: Deploy Bronze
        run: |
          dbt run --select tag:bronze --profiles-dir . --target prod \
            ${{ github.event.inputs.full_refresh == 'true' && '--full-refresh' || '' }}

      - name: Test Bronze
        run: dbt test --select tag:bronze --profiles-dir . --target prod

      # Deploy: Silver layer
      - name: Deploy Silver
        run: |
          dbt run --select tag:silver --profiles-dir . --target prod \
            ${{ github.event.inputs.full_refresh == 'true' && '--full-refresh' || '' }}

      - name: Test Silver
        run: dbt test --select tag:silver --profiles-dir . --target prod

      # Deploy: Gold layer
      - name: Deploy Gold
        run: |
          dbt run --select tag:gold --profiles-dir . --target prod \
            ${{ github.event.inputs.full_refresh == 'true' && '--full-refresh' || '' }}

      - name: Test Gold
        run: dbt test --select tag:gold --profiles-dir . --target prod

      # Snapshots
      - name: Run snapshots
        run: dbt snapshot --profiles-dir . --target prod

      # Generate production docs
      - name: Generate docs
        run: dbt docs generate --profiles-dir . --target prod

      - name: Upload production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-prod-artifacts-${{ github.run_id }}
          path: |
            target/manifest.json
            target/run_results.json
            target/catalog.json
          retention-days: 30

      # Save manifest for future slim CI comparisons
      - name: Cache production manifest
        uses: actions/cache/save@v4
        with:
          path: target/manifest.json
          key: dbt-prod-manifest-${{ github.sha }}
